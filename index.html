<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>wheather app</title>
</head>

<body>
    <div class="card">
        <nav>
            <input type="text" placeholder="Enter your city" spellcheck="true">
            <button><img src="./images/search.png"></button>
        </nav>
        <div id="container">
            <div id="weather" >
            <img id="icon" src="./images/clear.png">
            <h1 id="temp">1°c</h1>
            <h1 id="city">Kota</h1>
            </div>
            <div id="extra">
            <div id="left-extra">
                <img src="./images/humidity.png">
                <h2 id="humidity">90%</h2>
                <h3>Humidity</h3>
            </div>
            <div id="right-extra">
                <img src="./images/wind.png">
                <h2 id="wind">2.68Km/hr</h2>
                <h3>Wind Speed</h3>
                </div>
            </div>
        </div>
    </div>


  <script src="index.js"></script>
</body>

</html>
